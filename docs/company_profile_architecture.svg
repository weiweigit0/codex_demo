  <text class="tiny" x="458" y="448">2. 选择年报或招股说明书</text>
  <text class="tiny" x="458" y="468">3. 抽取 PDF 文本并切块</text>
  <text class="tiny" x="458" y="488">4. 构建画像 sections</text>

